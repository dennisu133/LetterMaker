<!doctype html>
<html lang="en">
	<head>
		<!-- Boilerplate -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Favicons -->
		<link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260701" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260701" />
		<link rel="shortcut icon" href="/favicon.ico?v=20260701" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260701" />
		<meta name="apple-mobile-web-app-title" content="LetterMaker" />
		<link rel="manifest" href="/site.webmanifest?v=20260701" />

		<!-- Fixed Metadata -->
		<title>LetterMaker</title>
		<meta name="description" content="Generate PDF letters with ease." />
		<meta name="author" content="Dennis Karnowitsch" />
		<meta name="keywords" content="letter, letter generator, letter to pdf, letter maker" />
		<meta name="theme-color" content="#181E2C" />

		<!-- Open Graph -->
		<meta property="og:title" content="LetterMaker" />
		<meta property="og:description" content="Generate PDF letters with ease." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://letter.dennisu.com" />
		<meta property="og:image" content="/og-card.png" />
	</head>

	<body>
		<noscript>
			<style>
				:root {
					color-scheme: light dark;
				}
			</style>

			Please <a href="https://www.enable-javascript.com/" target="_blank">enable JavaScript.</a>
		</noscript>
		<script>
			localStorage.theme === "dark" ||
			(localStorage.theme !== "light" && matchMedia("(prefers-color-scheme:dark)").matches)
				? document.documentElement.classList.add("dark")
				: 0;
		</script>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
